<!DOCTYPE html>
<html>
<head>
<title>Approved Issuers</title>
<style>
body { font-family:Arial; background:#f4f6f9; padding:30px; }
table {
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
th {
    background:#27ae60;
    color:white;
    padding:12px;
}
td {
    padding:12px;
    border-bottom:1px solid #ddd;
}
tr:hover { background:#f1f1f1; }
.badge {
    padding:5px 10px;
    border-radius:15px;
    background:#27ae60;
    color:white;
    font-size:12px;
}
</style>
</head>
<body>

<h2>Approved Issuers</h2>
<button onclick="window.location.href='/admin'">← Back</button>

<table id="table">
<tr>
<th>ID</th>
<th>Organization</th>
<th>Type</th>
<th>Email</th>
<th>Blockchain Address</th>
<th>Status</th>
<th>Registration Date</th>
</tr>
</table>

<script>
async function load(){
    const res = await fetch("/api/admin/approved_issuers");
    const data = await res.json();

    const table = document.getElementById("table");

    data.forEach(i=>{
        const row = table.insertRow();
        row.insertCell(0).innerText = i.issuerId;
        row.insertCell(1).innerText = i.organizationName;
        row.insertCell(2).innerText = i.organizationType;
        row.insertCell(3).innerText = i.email;
        row.insertCell(4).innerText = i.blockchainAddress || "-";
        row.insertCell(5).innerHTML = `<span class="badge">APPROVED</span>`;
        row.insertCell(6).innerText = i.registrationDate;
    });
}
load();
</script>

</body>
</html>
