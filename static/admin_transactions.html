<!DOCTYPE html>
<html>
<head>
    <title>Transactions</title>
    <style>
        body { font-family:Arial; background:#f4f6f9; margin:0; padding:30px; }
        h2 { margin-bottom:20px; }

        table {
            width:100%;
            border-collapse:collapse;
            background:white;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        th {
            background:#2c3e50;
            color:white;
            padding:12px;
            text-align:left;
        }

        td {
            padding:12px;
            border-bottom:1px solid #ddd;
        }

        tr:hover {
            background:#f1f1f1;
        }

        .btn {
            margin-bottom:20px;
            padding:8px 15px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<h2>Blockchain Transactions</h2>
<button class="btn" onclick="goBack()">← Back</button>

<table id="table">
<tr>
<th>Transaction ID</th>
<th>Issuer</th>
<th>Timestamp</th>
</tr>
</table>

<script>
function goBack(){ window.location.href="/admin"; }

async function loadTransactions(){
    const res = await fetch("/api/admin/transactions");
    const data = await res.json();

    const table = document.getElementById("table");

    data.forEach(tx=>{
        const row = table.insertRow();
        row.insertCell(0).innerText = tx.transactionHash;
        row.insertCell(1).innerText = tx.issuer;
        row.insertCell(2).innerText = tx.timestamp;
    });
}

loadTransactions();
</script>

</body>
</html>
